<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco | Overdrop Rafting</title>

    <meta name="description" content="Entre em contato conosco para encontrar a adrenalina e paz, tudo em 
    contato com a natureza. Tire dúvidas sobre o horário de funcionamento, valores e mais">
    <meta name="author" content="Daniel Greffe">
    <link rel="stylesheet" href="estilos/rafting.css">
</head>

<body>
    <header>
        <img src="imagens/logo.png" alt="Logotipo Rafting">
        <nav class="navegacao">
            <ul>
                <li><a href="index.html">Página Inicial</a></li>
                <li><a href="sobre.html">Sobre Nós</a></li>
                <li><a href="passeios.html">Passeios</a></li>
                <li><a href="contato.html">Fale Conosco</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="hero">
            <section class="section-forms">
                <div class="grid-formulario">
                    <h1 class="titulo-informacoes">Overdrop Rafting</h1>
                    <div class="informacoes">
                        <p>
                            123 Rua Principal do Rio<br>
                            Campo Grande, Mato Grosso do Sul <br>
                            +55 67 99999-9999<br>
                            overdrop@correiras.com</p>
                    </div>
                    <div class="griframe">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d17782.32464398915!2d-54.573962011650075!3d-20.45396669597728!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1spt-BR!2sbr!4v1780606722133!5m2!1spt-BR!2sbr"
                            allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                    <div class="griforms">
                        <form><br><br>
                            <label for="nome">Nome:</label>
                            <input type="text" id="nome" name="nome" placeholder="Digite seu nome"><br><br>
                            <label for="email">E-mail:</label>
                            <input type="email" id="email" name="email" placeholder="Digite seu e-mail"><br><br>
                            <div class="opcoes-container">
                                <label id="assunto">Objetivo da Mensagem:</label>
                                <label class="opcao">
                                    <input id="radio-1" type="radio" name="proposito" value="duvida_geral">
                                    Dúvida Geral
                                </label>
                                <label class="opcao">
                                    <input id="radio-2" type="radio" name="proposito" value="pergunta_reserva">
                                    Pergunta sobre Reserva
                                </label>
                                <label class="opcao">
                                    <input id="radio-3" type="radio" name="proposito" value="sugestao">
                                    Sugestão
                                </label><br>
                            </div>
                            <label id="mensagem-2">Mensagem<br>
                                <textarea id="mensagem-1" name="mensagem" rows="4"
                                    placeholder="Digite sua mensagem aqui"></textarea><br><br>
                            </label>
                            <label><input type="checkbox" id="newsletter" name="newsletter">
                                Quero me inscrever na newsletter mensal! </label><br><br>
                            <button type="submit"> Enviar contato </button>
                        </form>
                    </div>
                </div>
            </section>
        </div>
        <section class="section-2">
            <h2>Estamos aqui para servi-lo!</h2>
            <div class="alinhados">
                <figure>
                    <img src="imagens/funcionario-1.png" alt="Rafael Costa">
                    <figcaption>Rafael Costa</figcaption>
                </figure>
                <figure>
                    <img src="imagens/funcionario-2.png" alt="Mariana Almeida">
                    <figcaption>Mariana Almeida</figcaption>
                </figure>
                <figure>
                    <img src="imagens/funcionario-3.png" alt="Lucas Ferreira">
                    <figcaption>Lucas Ferreira</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Outdrop Rafting | Daniel Greffe</p>
        <nav class="redes-sociais">
            <a href="https://facebook.com">
                <img src="imagens/facebook.svg" alt="Ícone do Facebook">
            </a>
            <a href="https://instagram.com">
                <img src="imagens/instagram.svg" alt="Ícone do Instagram">
            </a>
            <a href="https://linkedin.com">
                <img src="imagens/linkedin.svg" alt="Ícone do LinkedIn">
            </a>
        </nav>
    </footer>
</body>

</html>
